<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Challenge</title>
    <style>
        /* --- CSS Variables for Theming (Added for dark mode support) --- */
        :root {
            --bg-color-light: #f7f9fc;
            --card-bg-light: #ffffff;
            --question-box-bg: #e8f0fe;
            --text-color-light: #333;
            --text-color-secondary: #666;
            --primary-color: #1a73e8;
            --option-bg: #f0f4f8;
            --option-hover-bg: #d1e3f8;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        body.dark-theme {
            --bg-color-light: #121212;
            --card-bg-light: #1e1e1e;
            --question-box-bg: #3a3a3a;
            --text-color-light: #f0f0f0;
            --text-color-secondary: #b0b0b0;
            --primary-color: #4da6ff;
            --option-bg: #2c2c2c;
            --option-hover-bg: #444444;
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color-light);
            color: var(--text-color-light);
            transition: background-color 0.3s, color 0.3s;
        }
        .quiz-container {
            background-color: var(--card-bg-light);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--shadow-color);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }
        h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 2px solid var(--text-color-secondary);
            margin-bottom: 2rem;
            font-weight: 600;
        }
        .question-box {
            min-height: 100px;
            background-color: var(--question-box-bg);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-color-light);
            text-align: center;
        }
        .options-list {
            display: grid;
            gap: 1rem;
            list-style: none;
            padding: 0;
        }
        .option-item {
            background-color: var(--option-bg);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-weight: 500;
            text-align: left;
            color: var(--text-color-light);
        }
        .option-item:hover {
            background-color: var(--option-hover-bg);
            transform: translateY(-2px);
        }
        .option-item.correct {
            background-color: #a8e6cf;
            pointer-events: none;
            color: #1e293b;
        }
        .option-item.incorrect {
            background-color: #ff9999;
            pointer-events: none;
            color: #1e293b;
        }
        .next-button {
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .next-button:hover {
            background-color: #45a049;
        }
        .feedback {
            margin-top: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .end-game-buttons {
            display: none;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .game-button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: background-color 0.3s ease;
        }
        #play-again-button {
            background-color: #3498db;
        }
        #go-back-button {
            background-color: #f08080;
        }
        #play-again-button:hover {
            background-color: #2980b9;
        }
        #go-back-button:hover {
            background-color: #cd5c5c;
        }
        
        /* Adaptive Feedback Styling */
        #adaptive-feedback {
            margin-top: 1rem;
            padding: 1.5rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            line-height: 1.5;
        }
        #adaptive-feedback.low-score {
            background-color: #fff3cd; /* Yellow for low score */
            color: #856404;
        }
        #adaptive-feedback.high-score {
            background-color: #d4edda; /* Green for high score */
            color: #155724;
        }
    </style>
</head>

            clearInterval(timer); 
            timer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                    endQuiz();
                }

            if (currentQuestionIndex >= currentQuiz.questions.length) {

                const li = document.createElement('li');
                li.classList.add('option-item');
                li.textContent = option;

                optionsList.appendChild(li);
            });
            nextButton.style.display = 'none';
            feedbackMessage.textContent = '';
        }

                } else if (li.textContent === selectedOption) {
                    li.classList.add('incorrect');
                }
            });
            
            // Score is based on correct answers (max 10 points per quiz)
            if (selectedOption === correctAnswer) {
                score += 1; 
                feedbackMessage.textContent = 'Correct! 🎉';

            let recentActivities = JSON.parse(localStorage.getItem('recentActivities')) || [];
            recentActivities.push({ name, points, timestamp: new Date() }); 
            localStorage.setItem('recentActivities', JSON.stringify(recentActivities));
        }

        async function endQuiz() {
            clearInterval(timer);
            const totalQuestions = currentQuiz.questions.length;
            const percentage = (score / totalQuestions) * 100;
            const pointsToAward = score * 10; // 10 points per correct answer
            const userEmail = localStorage.getItem("userEmail");

            questionBox.textContent = 'Quiz Over!';
            optionsList.innerHTML = '';
            nextButton.style.display = 'none';
            endGameButtons.style.display = 'flex';
            
            // --- ADAPTIVE LOGIC ---
            adaptiveFeedback.style.display = 'block';
            
            if (percentage >= PASS_THRESHOLD_PERCENTAGE) {
                adaptiveFeedback.classList.add('high-score');
                adaptiveFeedback.classList.remove('low-score');
                
                adaptiveFeedback.innerHTML = `
                    **Congratulations!** You scored **${score}/${totalQuestions}** (${percentage.toFixed(0)}%)! 🎉
                    <br>You are ready for the next level challenge!
                `;
                 // Update Play Again button for high score
                playAgainButton.textContent = 'Go to Next Challenge';
                playAgainButton.onclick = () => { window.location.href = 'quiz.html'; }; // Go back to challenge list
                
            } else {
                adaptiveFeedback.classList.add('low-score');
                adaptiveFeedback.classList.remove('high-score');
                
                adaptiveFeedback.innerHTML = `
                    You scored **${score}/${totalQuestions}** (${percentage.toFixed(0)}%). 🙁
                    <br>It looks like you need a little more practice. Try playing again!
                `;
                // Keep Play Again button for low score
                playAgainButton.textContent = 'Practice Again (Same Quiz)';
                playAgainButton.onclick = () => { 
                    currentQuestionIndex = 0;
                    score = 0;
                    timeLeft = 60;
                    initializeQuiz();
                    adaptiveFeedback.style.display = 'none';
                };
            }
            
            feedbackMessage.textContent = `Total Points Earned: ${pointsToAward} Coins!`;
            // --- END ADAPTIVE LOGIC ---

            // --- SCORE UPDATE LOGIC (Updated to include subjectId) ---
            try {
                const response = await fetch('/api/update-score', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('eduquest_token')}`
                    },
                    body: JSON.stringify({ 
                        email: userEmail, 
                        points: pointsToAward,
                        subject: subjectId // NEW: Send the subject ID for subject leaderboard!
                    }),
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('totalScore', data.newScore);
                    logActivity(currentQuiz.name, pointsToAward);

                    // Also log the quiz completion for Dashboard's completed Quizzes section
                    let completedQuizzes = JSON.parse(localStorage.getItem('completedQuizzes')) || [];
                    if (!completedQuizzes.includes(quizId)) {
                         completedQuizzes.push(quizId);
                         localStorage.setItem('completedQuizzes', JSON.stringify(completedQuizzes));
                    }
                } else {
                    console.error('Failed to update server score.');
                }
            } catch (error) {
                console.error('Error updating score:', error);
            }
            
            // Save quiz score to localStorage (for dashboard processing on next page load)
            localStorage.setItem('quizCompleted', 'true');
            localStorage.setItem('quizScore', pointsToAward); 
            localStorage.setItem('completedQuizName', currentQuiz.name);
        }
        
        nextButton.addEventListener('click', () => {
            currentQuestionIndex++;
            loadQuestion();
        });

        playAgainButton.addEventListener('click', () => {
            // Adaptive logic handles this now, default click listener remains for safety/fallbacks.
        });
        
        goBackButton.addEventListener('click', () => {
            window.location.href = 'subjects.html';
        });

        function initializeQuiz() {
            if (currentQuiz) {
                loadQuestion();
                startTimer();
                endGameButtons.style.display = 'none';
                document.querySelector('h1').textContent = currentQuiz.name; // Reset header title
            }
        }
        
        window.onload = initializeQuiz;
    </script>
</body>
</html>
