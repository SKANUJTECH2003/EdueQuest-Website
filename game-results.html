<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Results - Score Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        
        .header { text-align: center; margin-bottom: 40px; }
        .title { font-size: 2.5rem; color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #999; font-size: 1.1rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-box { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 30px; border-radius: 20px; text-align: center; }
        .stat-box h3 { font-size: 0.9rem; opacity: 0.9; margin-bottom: 10px; }
        .stat-box .value { font-size: 2.5rem; font-weight: bold; }
        
        .games-history { margin-top: 40px; }
        .games-history h2 { color: #667eea; margin-bottom: 20px; }
        
        .game-item { background: #f5f5f5; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .game-info { flex: 1; }
        .game-info h4 { color: #333; margin-bottom: 5px; }
        .game-info p { color: #999; font-size: 0.9rem; }
        
        .game-score { text-align: right; }
        .score { background: #667eea; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin-bottom: 5px; }
        .time { color: #999; font-size: 0.9rem; }
        
        .buttons { display: flex; gap: 10px; margin-top: 30px; justify-content: center; }
        button { padding: 12px 30px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-clear { background: #f44336; color: white; }
        .btn-clear:hover { background: #da190b; }
        .btn-back { background: #667eea; color: white; }
        .btn-back:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">📊 Game Results</h1>
            <p class="subtitle">Your gaming performance and scores</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <h3>Total Score</h3>
                <div class="value" id="totalScore">0</div>
            </div>
            <div class="stat-box">
                <h3>Games Played</h3>
                <div class="value" id="gamesPlayed">0</div>
            </div>
            <div class="stat-box">
                <h3>Average Score</h3>
                <div class="value" id="avgScore">0%</div>
            </div>
        </div>
        
        <div class="games-history">
            <h2>🎮 Game History</h2>
            <div id="gamesList"></div>
        </div>
        
        <div class="buttons">
            <button class="btn-back" onclick="goBack()">← Back to Games</button>
            <button class="btn-clear" onclick="clearData()">Clear History</button>
        </div>
    </div>
    
    <script src="progress-tracker.js"></script>
    <script>
        function loadResults() {
            // primary source is ProgressTracker, fallback to legacy storage
            const stats = ProgressTracker.getPerformanceStats();
            const gamesHistory = JSON.parse(localStorage.getItem('gamesHistory') || '[]');
            const totalScore = stats.totalScore || parseInt(localStorage.getItem('totalGameScore') || '0');
            
            // Update stats
            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('gamesPlayed').textContent = stats.totalGamesPlayed || gamesHistory.length;
            
            let avgScoreText = '0%';
            if (stats.averageScore) {
                avgScoreText = Math.floor(stats.averageScore) + '%';
            } else if (gamesHistory.length > 0) {
                avgScoreText = Math.floor(totalScore / gamesHistory.length) + '%';
            }
            document.getElementById('avgScore').textContent = avgScoreText;
            
            // Display games
            const gamesList = document.getElementById('gamesList');
            if (gamesHistory.length === 0) {
                gamesList.innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">No games played yet. Go play some games!</p>';
                return;
            }
            
            gamesList.innerHTML = gamesHistory.map((game, index) => `
                <div class="game-item">
                    <div class="game-info">
                        <h4>${game.gameTitle}</h4>
                        <p>Completed on ${new Date(game.completedAt).toLocaleDateString()}</p>
                    </div>
                    <div class="game-score">
                        <div class="score">⭐ ${game.score}</div>
                        <div class="time">⏱️ ${game.timeInSeconds}s</div>
                    </div>
                </div>
            `).join('');
        }
        
        function clearData() {
            if (confirm('Are you sure you want to clear all game history?')) {
                localStorage.removeItem('gamesHistory');
                localStorage.removeItem('totalGameScore');
                localStorage.removeItem('lastGameScore');
                location.reload();
            }
        }
        
        function goBack() {
            window.location.href = 'subjects.html';
        }
        
        // Load on page load
        loadResults();
    </script>
</body>
</html>
