<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Wheel</title>
    <script src="gameframework.js"></script>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e0f2fe;
            color: #333;
            text-align: center;
        }

        .game-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        h1 {
            color: #4682b4;
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        .word-wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        .wheel-letter {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            font-weight: bold;
            background-color: #87cefa;
            color: #fff;
            border: 2px solid #4682b4;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .wheel-letter:hover {
            transform: scale(1.1);
        }

        .center-letter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background-color: #4682b4;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            font-weight: bold;
            color: #fff;
            cursor: default;
        }

        .input-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        #current-word {
            font-size: 2em;
            font-weight: bold;
            color: #5d4037;
            min-height: 40px;
            border-bottom: 2px solid #ccc;
            width: 250px;
            text-transform: uppercase;
        }

        .word-list-container {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            background-color: #f5f5f5;
        }

        #found-words-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }

        #found-words-list li {
            background-color: #4b8a2a;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 1.2em;
        }

        .game-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            display: none;
        }

        .game-button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        #play-again-button {
            background-color: #4b8a2a;
        }

        #go-back-button {
            background-color: #e74c3c;
        }

        #play-again-button:hover {
            background-color: #3e7021;
        }

        #go-back-button:hover {
            background-color: #c0392b;
        }
        
        #message {
            font-size: 1.5em;
            font-weight: bold;
            color: #5d4037;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🎮 शब्द चक्र (Word Wheel)</h1>
            <div class="game-header-right">
                <div class="game-stat">
                    <span class="game-stat-label">Score</span>
                    <span class="game-stat-value" id="score">0</span>
                </div>
                <div class="game-stat timer">
                    <i class="fas fa-clock"></i>
                    <span id="timer">02:00</span>
                </div>
            </div>
        </div>
        
        <div class="stats-bar">
            <span class="stat">Words Found: <span id="words-found">0</span></span>
        </div>
        
        <div class="word-wheel-container" id="word-wheel">
            </div>

        <div id="current-word"></div>

        <div class="input-section">
            <button class="game-button" id="submit-word">Submit</button>
            <button class="game-button" id="clear-word" style="background-color: #f1c40f;">Clear</button>
        </div>

        <div class="word-list-container">
            <h3>Found Words:</h3>
            <ul id="found-words-list"></ul>
        </div>
        
        <div id="message"></div>
        <div class="game-buttons" id="end-game-buttons">
            <button id="play-again-button" class="game-button">Play Again</button>
            <button id="go-back-button" class="game-button">Go Back</button>
        </div>
    </div>
    
    <script>
        // Initialize Game Framework
        const gameManager = new GameManager('Word Wheel', 'games');
        if (!gameManager.init()) {
            window.location.href = '/login.html';
        }

        const words = ['train', 'brain', 'rain', 'tin', 'ran', 'ant', 'art', 'rat', 'tan', 'tar', 'rant', 'trait', 'tan', 'tarn', 'tin', 'bin', 'bar', 'bat', 'ban', 'nat', 'bit', 'brat'];
        const wordWheelData = ['T', 'R', 'A', 'I', 'N', 'B', 'P'];
        const centerLetter = 'A';

        const wordWheel = document.getElementById('word-wheel');
        const scoreDisplay = document.getElementById('score');
        const wordsFoundDisplay = document.getElementById('words-found');
        const timerDisplay = document.getElementById('timer');
        const currentWordDisplay = document.getElementById('current-word');
        const foundWordsList = document.getElementById('found-words-list');
        const submitButton = document.getElementById('submit-word');
        const clearButton = document.getElementById('clear-word');
        const messageElement = document.getElementById('message');
        const endGameButtons = document.getElementById('end-game-buttons');
        const playAgainButton = document.getElementById('play-again-button');
        const goBackButton = document.getElementById('go-back-button');

        let score = 0;
        let timeLeft = 120; // 2 minutes for a challenge
        let timer;
        let foundWords = new Set();
        let currentWord = '';

        function createWheel() {
            wordWheel.innerHTML = '';
            const totalLetters = wordWheelData.length;
            const angleStep = 360 / totalLetters;
            
            wordWheelData.forEach((letter, index) => {
                const angle = angleStep * index;
                const radius = 100;
                const x = radius * Math.cos(angle * Math.PI / 180);
                const y = radius * Math.sin(angle * Math.PI / 180);

                const letterDiv = document.createElement('div');
                letterDiv.classList.add('wheel-letter');
                letterDiv.textContent = letter;
                letterDiv.style.transform = `translate(${x}px, ${y}px)`;
                letterDiv.addEventListener('click', () => appendLetter(letter));
                wordWheel.appendChild(letterDiv);
            });

            const centerDiv = document.createElement('div');
            centerDiv.classList.add('center-letter');
            centerDiv.textContent = centerLetter;
            centerDiv.addEventListener('click', () => appendLetter(centerLetter));
            wordWheel.appendChild(centerDiv);
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function appendLetter(letter) {
            currentWord += letter.toLowerCase();
            currentWordDisplay.textContent = currentWord;
        }

        function clearWord() {
            currentWord = '';
            currentWordDisplay.textContent = '';
        }

        function submitWord() {
            if (currentWord.length < 3) {
                messageElement.textContent = 'Word must be at least 3 letters long!';
                return;
            }

            if (!currentWord.includes(centerLetter.toLowerCase())) {
                messageElement.textContent = `Word must contain the center letter '${centerLetter}'!`;
                return;
            }

            if (foundWords.has(currentWord)) {
                messageElement.textContent = 'You have already found this word!';
                return;
            }

            if (words.includes(currentWord)) {
                messageElement.textContent = 'Correct! Good job!';
                score += currentWord.length;
                gameManager.score = score;
                gameManager.updateScoreUI(scoreDisplay);
                foundWords.add(currentWord);
                wordsFoundDisplay.textContent = foundWords.size;
                const newWordItem = document.createElement('li');
                newWordItem.textContent = currentWord;
                foundWordsList.appendChild(newWordItem);
            } else {
                messageElement.textContent = 'Incorrect word! Try again.';
            }

            setTimeout(() => {
                messageElement.textContent = '';
                clearWord();
            }, 1000);
        }
        
        async function endGame() {
            clearInterval(timer);
            gameManager.score = score;
            await gameManager.updateScoreOnServer();
            messageElement.textContent = `Game Over! Your final score is ${score}.`;
            endGameButtons.style.display = 'flex';
            gameManager.showCompletionPopup();
        }

        function initializeGame() {
            score = 0;
            timeLeft = 120;
            foundWords.clear();
            currentWord = '';
            wordsFoundDisplay.textContent = '0';
            timerDisplay.textContent = '02:00';
            currentWordDisplay.textContent = '';
            foundWordsList.innerHTML = '';
            messageElement.textContent = '';
            endGameButtons.style.display = 'none';
            gameManager.score = 0;
            createWheel();
            startTimer();
        }

        submitButton.addEventListener('click', submitWord);
        clearButton.addEventListener('click', clearWord);
        playAgainButton.addEventListener('click', initializeGame);
        goBackButton.addEventListener('click', async () => {
            gameManager.score = score;
            await gameManager.updateScoreOnServer(e);
            localStorage.setItem('gameCompleted', 'true');
            window.history.back();
        });

        window.onload = initializeGame;
    </script>
</body>
</html>
