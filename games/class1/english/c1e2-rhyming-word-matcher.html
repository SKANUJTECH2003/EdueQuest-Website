<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhyming Word Matcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .title { text-align: center; font-size: 2rem; color: #667eea; margin-bottom: 20px; }
        .question { background: #f5f5f5; padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center; font-size: 1.5rem; }
        .question span { color: #667eea; font-weight: bold; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .option { padding: 20px; background: #f5f5f5; border-radius: 15px; cursor: pointer; font-size: 1.3rem; transition: all 0.3s; border: 3px solid transparent; }
        .option:hover { transform: translateY(-5px); background: #e0e0e0; }
        .option.selected { background: #667eea; color: white; border-color: #667eea; }
        .buttons { text-align: center; margin-top: 30px; }
        button { padding: 12px 30px; margin: 10px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .btn-submit { background: #4caf50; color: white; }
        .btn-home { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Rhyming Word Matcher</h1>
        <div class="question">Do <span id="word1">cat</span> and <span id="word2">hat</span> rhyme?</div>
        <div class="options">
            <div class="option" onclick="selectAnswer(true)">✅ Yes, they rhyme!</div>
            <div class="option" onclick="selectAnswer(false)">❌ No, they don't rhyme</div>
        </div>
        <div class="buttons">
            <button class="btn-submit" onclick="checkAnswer()">Check Answer</button>
            <button class="btn-home" onclick="goHome()">Back Home</button>
        </div>
    </div>
    
    <script>
        const pairs = [{"word1": "cat", "word2": "hat", "correct": true}, {"word1": "dog", "word2": "log", "correct": true}, {"word1": "sit", "word2": "bit", "correct": true}, {"word1": "run", "word2": "sun", "correct": true}, {"word1": "play", "word2": "day", "correct": true}];
        let currentIndex = 0;
        let selected = null;
        
        function displayPair() {
            const pair = pairs[currentIndex];
            document.getElementById('word1').textContent = pair.word1;
            document.getElementById('word2').textContent = pair.word2;
            selected = null;
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
        }
        
        function selectAnswer(answer) {
            selected = answer;
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
        }
        
        function checkAnswer() {
            if (selected === null) { alert('Please select an answer'); return; }
            const correct = pairs[currentIndex].correct;
            if (selected === correct) {
                currentIndex++;
                if (currentIndex < pairs.length) {
                    displayPair();
                } else {
                    alert('🎉 Perfect! You completed the rhyming game!');
                    goHome();
                }
            } else {
                alert('Try again!');
            }
        }
        
        function goHome() {
            saveScore();
            window.location.href = '/subjects.html';
        }
        
        displayPair();
    
        
        // Save score to localStorage
        function saveScore() {
            const gameId = 'class1-game';
            const score = Math.floor(Math.random() * 100); // Placeholder
            const timestamp = new Date().toISOString();
            
            // Store individual game score
            localStorage.setItem('lastGameScore', score);
            localStorage.setItem('lastGameTime', timestamp);
            localStorage.setItem('lastGameId', gameId);
            
            // Add to total
            let totalScore = parseInt(localStorage.getItem('totalGameScore') || '0');
            totalScore += score;
            localStorage.setItem('totalGameScore', totalScore);
            
            console.log(`Score saved: ${score}`);
        }
        
        
        // Timer functionality
        let gameStartTime;
        function startTimer() {
            gameStartTime = Date.now();
        }
        
        function getElapsedTime() {
            return Math.floor((Date.now() - gameStartTime) / 1000); // seconds
        }
        </script>
</body>
</html>
