<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVC Word Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .title { text-align: center; font-size: 2rem; color: #667eea; margin-bottom: 30px; }
        .challenge { background: #f5f5f5; padding: 30px; border-radius: 15px; text-align: center; margin: 20px 0; }
        .challenge-text { font-size: 1.2rem; color: #666; margin-bottom: 15px; }
        .word-display { font-size: 3rem; font-weight: bold; color: #667eea; letter-spacing: 10px; }
        .letters { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .letter-btn { padding: 20px; background: #667eea; color: white; border: none; border-radius: 15px; cursor: pointer; font-size: 1.5rem; font-weight: bold; }
        .letter-btn:hover { transform: scale(1.1); }
        .buttons { text-align: center; margin-top: 30px; }
        button { padding: 12px 30px; margin: 10px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .btn-check { background: #4caf50; color: white; }
        .btn-home { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">CVC Word Builder</h1>
        <div class="challenge">
            <div class="challenge-text">Arrange letters to make a word:</div>
            <div class="word-display" id="display">_ _ _</div>
        </div>
        <div class="letters" id="letters"></div>
        <div class="buttons">
            <button class="btn-check" onclick="checkWord()">Check Word</button>
            <button class="btn-home" onclick="goHome()">Back Home</button>
        </div>
    </div>
    
    <script>
        const words = [{"word": "cat", "letters": ["c", "a", "t"]}, {"word": "dog", "letters": ["d", "o", "g"]}, {"word": "bat", "letters": ["b", "a", "t"]}, {"word": "hat", "letters": ["h", "a", "t"]}, {"word": "sit", "letters": ["s", "i", "t"]}];
        let currentIndex = 0;
        let selected = [];
        
        function displayWord() {
            const current = words[currentIndex];
            let html = '';
            current.letters.forEach((letter, idx) => {
                html += `<button class="letter-btn" onclick="selectLetter(\`${letter}\`, ${idx})">${letter.toUpperCase()}</button>`;
            });
            document.getElementById('letters').innerHTML = html;
            selected = [];
            updateDisplay();
        }
        
        function selectLetter(letter, idx) {
            selected.push(letter);
            updateDisplay();
        }
        
        function updateDisplay() {
            document.getElementById('display').textContent = selected.map(l => l.toUpperCase()).join(' ') || '_ _ _';
        }
        
        function checkWord() {
            const current = words[currentIndex];
            const formed = selected.join('');
            if (formed === current.word) {
                currentIndex++;
                if (currentIndex < words.length) {
                    displayWord();
                } else {
                    alert('🎉 Awesome! You learned all words!');
                    goHome();
                }
            } else {
                alert(`Try again! The word is: ${current.word.toUpperCase()}`);
                selected = [];
                updateDisplay();
            }
        }
        
        function goHome() {
            saveScore();
            window.location.href = '/subjects.html';
        }
        
        displayWord();
    
        
        // Save score to localStorage
        function saveScore() {
            const gameId = 'class1-game';
            const score = Math.floor(Math.random() * 100); // Placeholder
            const timestamp = new Date().toISOString();
            
            // Store individual game score
            localStorage.setItem('lastGameScore', score);
            localStorage.setItem('lastGameTime', timestamp);
            localStorage.setItem('lastGameId', gameId);
            
            // Add to total
            let totalScore = parseInt(localStorage.getItem('totalGameScore') || '0');
            totalScore += score;
            localStorage.setItem('totalGameScore', totalScore);
            
            console.log(`Score saved: ${score}`);
        }
        
        
        // Timer functionality
        let gameStartTime;
        function startTimer() {
            gameStartTime = Date.now();
        }
        
        function getElapsedTime() {
            return Math.floor((Date.now() - gameStartTime) / 1000); // seconds
        }
        </script>
</body>
</html>
