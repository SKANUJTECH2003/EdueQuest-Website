<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd/Even Numbers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        .title { font-size: 2rem; color: #667eea; margin-bottom: 30px; }
        .content { background: #f5f5f5; padding: 30px; border-radius: 15px; margin: 20px 0; }
        .buttons { margin-top: 30px; }
        button { padding: 12px 30px; margin: 10px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .btn-next { background: #4caf50; color: white; }
        .btn-home { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Odd/Even Numbers</h1>
        <div class="content">
            <p>🎮 This is an interactive game!</p>
            <p style="margin-top: 20px; font-size: 0.9rem; color: #999;">Game mechanics being implemented...</p>
        </div>
        <div class="buttons">
            <button class="btn-next" onclick="nextQuestion()">Practice Questions</button>
            <button class="btn-home" onclick="goHome()">Back Home</button>
        </div>
    </div>
    
    <script>
        let gameStartTime;
        let gameScore = 0;
        
        function startTimer() {
            gameStartTime = Date.now();
        }
        
        function getElapsedTime() {
            if (!gameStartTime) return 0;
            return Math.floor((Date.now() - gameStartTime) / 1000);
        }
        
        function saveScore() {
            const elapsed = getElapsedTime();
            const score = Math.min(100, gameScore || 50);
            const bonus = Math.max(0, 20 - elapsed);
            const finalScore = Math.min(100, score + bonus);
            
            const gameData = {
                gameId: 'c1m8',
                gameTitle: 'Odd/Even Numbers',
                score: finalScore,
                timeInSeconds: elapsed,
                completedAt: new Date().toISOString()
            };
            
            localStorage.setItem('lastGameScore', finalScore);
            localStorage.setItem('lastGameData', JSON.stringify(gameData));
            
            let gamesHistory = JSON.parse(localStorage.getItem('gamesHistory') || '[]');
            gamesHistory.push(gameData);
            localStorage.setItem('gamesHistory', JSON.stringify(gamesHistory));
            
            let totalScore = parseInt(localStorage.getItem('totalGameScore') || '0');
            totalScore += finalScore;
            localStorage.setItem('totalGameScore', totalScore);
            
            console.log(`Game saved: Odd/Even Numbers - Score: ${finalScore}`);
        }
        
        function nextQuestion() {
            // Questions will appear here
        }
        
        function goHome() {
            saveScore();
            window.location.href = '/subjects.html';
        }
        
        // Start timer when game loads
        setTimeout(() => startTimer(), 500);
    </script>
</body>
</html>
