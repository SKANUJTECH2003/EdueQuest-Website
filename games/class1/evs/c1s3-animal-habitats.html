<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Habitats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .title { text-align: center; font-size: 2rem; color: #667eea; margin-bottom: 30px; }
        .match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin: 30px 0; }
        .column { background: #f5f5f5; padding: 20px; border-radius: 15px; }
        .column-title { text-align: center; color: #667eea; font-weight: bold; margin-bottom: 20px; }
        .items { display: flex; flex-direction: column; gap: 10px; }
        .item { padding: 15px; background: white; border-radius: 10px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .item:hover { transform: translateX(5px); }
        .buttons { text-align: center; margin-top: 30px; }
        button { padding: 12px 30px; margin: 10px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .btn-check { background: #4caf50; color: white; }
        .btn-home { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Animal Habitats</h1>
        <div class="match-container">
            <div class="column">
                <div class="column-title">Column A</div>
                <div class="items" id="colA"></div>
            </div>
            <div class="column">
                <div class="column-title">Column B</div>
                <div class="items" id="colB"></div>
            </div>
        </div>
        <div class="buttons">
            <button class="btn-check" onclick="checkMatches()">Check Matches</button>
            <button class="btn-home" onclick="goHome()">Back Home</button>
        </div>
    </div>
    
    <script>
        const pairs = [{"animal": "Fish", "habitat": "Water"}, {"animal": "Bird", "habitat": "Sky"}, {"animal": "Lion", "habitat": "Forest"}];
        let matches = {};
        
        function displayMatching() {
            let colA = '', colB = '';
            pairs.forEach((pair, idx) => {
                const key1 = Object.keys(pair)[0];
                const val1 = pair[key1];
                const key2 = Object.keys(pair)[1];
                const val2 = pair[key2];
                
                colA += `<div class="item" draggable="true" ondragstart="startDrag(event, ${idx}, 'A')">${val1}</div>`;
                colB += `<div class="item" ondrop="drop(event)" ondragover="allowDrop(event)">${val2}</div>`;
            });
            
            document.getElementById('colA').innerHTML = colA;
            document.getElementById('colB').innerHTML = colB;
        }
        
        function startDrag(event, index, col) {
            event.dataTransfer.setData('index', index);
        }
        
        function allowDrop(event) {
            event.preventDefault();
        }
        
        function drop(event) {
            event.preventDefault();
            alert('Matching completed!');
        }
        
        function checkMatches() {
            alert('🎉 Great matching skills!');
            goHome();
        }
        
        function goHome() {
            saveScore();
            window.location.href = '/subjects.html';
        }
        
        displayMatching();
    
        
        // Save score to localStorage
        function saveScore() {
            const gameId = 'class1-game';
            const score = Math.floor(Math.random() * 100); // Placeholder
            const timestamp = new Date().toISOString();
            
            // Store individual game score
            localStorage.setItem('lastGameScore', score);
            localStorage.setItem('lastGameTime', timestamp);
            localStorage.setItem('lastGameId', gameId);
            
            // Add to total
            let totalScore = parseInt(localStorage.getItem('totalGameScore') || '0');
            totalScore += score;
            localStorage.setItem('totalGameScore', totalScore);
            
            console.log(`Score saved: ${score}`);
        }
        
        
        // Timer functionality
        let gameStartTime;
        function startTimer() {
            gameStartTime = Date.now();
        }
        
        function getElapsedTime() {
            return Math.floor((Date.now() - gameStartTime) / 1000); // seconds
        }
        </script>
</body>
</html>
