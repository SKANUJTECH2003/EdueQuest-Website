<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Patterns</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .game-title {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .game-subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .game-content {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        
        .item {
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 2rem;
            font-weight: 600;
        }
        
        .item:hover {
            transform: translateY(-5px);
            background: #e0e0e0;
        }
        
        .item.selected {
            background: #667eea;
            color: white;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-next {
            background: #4caf50;
            color: white;
        }
        
        .btn-next:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .btn-home {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-home:hover {
            background: #e0e0e0;
        }
        
        .score-display {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #667eea;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }
            
            .game-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">Weather Patterns</h1>
            <p class="game-subtitle">Identify different weather types</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div style="font-size: 0.9rem; color: #999;">
                Question: <span id="currentQuestion">1</span> / <span id="totalQuestions">5</span>
            </div>
        </div>
        
        <div class="game-content" id="gameContent">
            <!-- Game content will be populated by JavaScript -->
        </div>
        
        <div class="score-display">Score: <span id="score">0</span>/5</div>
        
        <div class="buttons">
            <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">Next ➜</button>
            <button class="btn btn-home" onclick="goHome()">Back to Games</button>
        </div>
    </div>
    
    <script>
        const gameConfig = {'id': 'c1s8', 'name': 'Weather Patterns', 'desc': 'Identify different weather types', 'type': 'weather'};
        let currentIndex = 0;
        let score = 0;
        
        function initializeGame() {
            displayQuestion();
        }
        
        function displayQuestion() {
            const content = document.getElementById('gameContent');
            content.innerHTML = '<p>🎮 Game Loading...</p><p>This is a curriculum-aligned game for: weather</p>';
            
            document.getElementById('currentQuestion').textContent = currentIndex + 1;
            document.getElementById('totalQuestions').textContent = 5;
            const progress = ((currentIndex + 1) / 5) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }
        
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= 5) {
                endGame();
            } else {
                displayQuestion();
            }
        }
        
        function endGame() {
            localStorage.setItem('gameScore', score);
            localStorage.setItem('gameCompleted', 'true');
            localStorage.setItem('completedGameName', 'Weather Patterns');
            localStorage.setItem('completedGameId', 'c1s8');
            
            alert('Game Complete! Score: ' + score + '/5');
            window.location.href = '/subjects.html';
        }
        
        function goHome() {
            saveScore();
            window.location.href = '/subjects.html';
        }
        
        initializeGame();
    
        
        // Timer functionality
        let gameStartTime;
        function startTimer() {
            gameStartTime = Date.now();
        }
        
        function getElapsedTime() {
            return Math.floor((Date.now() - gameStartTime) / 1000); // seconds
        }
        </script>
</body>
</html>
