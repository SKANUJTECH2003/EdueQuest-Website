<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Creator 3D - Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            padding: 30px;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .game-title {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .score-bar {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 15px;
        }
        
        .score-item {
            background: #f5f5f5;
            padding: 10px 20px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
            font-weight: 600;
        }
        
        .score-item label {
            font-size: 0.8rem;
            color: #999;
        }
        
        .score-item value {
            display: block;
            font-size: 1.5rem;
            color: #667eea;
        }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 30px 0;
        }
        
        .game-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .game-card:hover {
            transform: scale(1.05);
        }
        
        .game-card.flipped {
            background: white;
            color: #333;
            box-shadow: inset 0 0 0 2px #667eea;
        }
        
        .game-card.matched {
            background: #4caf50;
            cursor: default;
            pointer-events: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 25px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .game-over-modal.show {
            display: flex;
        }
        
        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            animation: popIn 0.5s ease;
        }
        
        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .game-over-content h2 {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .game-over-content .final-score {
            font-size: 3rem;
            color: #4caf50;
            font-weight: bold;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .game-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">Story Creator 3D</h1>
            <p style="color: #666; margin: 10px 0;">Write and visualize stories in 3D</p>
        </div>
        
        <div class="score-bar">
            <div class="score-item">
                <label>Score</label>
                <value id="score">0</value>
            </div>
            <div class="score-item">
                <label>Matches</label>
                <value id="matches">0/8</value>
            </div>
            <div class="score-item">
                <label>Moves</label>
                <value id="moves">0</value>
            </div>
        </div>
        
        <div class="game-grid" id="gameGrid"></div>
        
        <div class="button-group">
            <button class="btn btn-secondary" onclick="resetGame()">🔄 Restart</button>
            <button class="btn btn-secondary" onclick="goHome()">🏠 Home</button>
        </div>
    </div>
    
    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-content">
            <h2>🎉 Congratulations!</h2>
            <p>You found all the pairs!</p>
            <div class="final-score" id="finalScore">0</div>
            <p style="color: #666; margin: 20px 0;">Great job! You're awesome!</p>
            <button class="btn btn-primary" onclick="goHome()" style="width: 100%; margin-top: 20px;">Back to Games</button>
        </div>
    </div>
    
    <script>
        const gameConfig = {"id": "c2e10", "name": "Story Creator 3D", "desc": "Write and visualize stories in 3D", "pairs": ["\ud83c\udf4e", "\ud83d\udc36", "\ud83c\udf88", "\u2b50", "\ud83c\udf19", "\ud83c\udf3b", "\ud83e\udd8b", "\ud83c\udfaf"]};
        let gameGrid = [];
        let selectedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let score = 0;
        
        function initializeGame() {
            gameGrid = [...gameConfig.pairs, ...gameConfig.pairs].sort(() => Math.random() - 0.5);
            renderGrid();
        }
        
        function renderGrid() {
            const gridElement = document.getElementById('gameGrid');
            gridElement.innerHTML = '';
            gameGrid.forEach((item, index) => {
                const card = document.createElement('button');
                card.className = 'game-card';
                card.textContent = '?';
                card.dataset.index = index;
                card.onclick = () => flipCard(card, index);
                gridElement.appendChild(card);
            });
        }
        
        function flipCard(card, index) {
            if (selectedCards.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }
            
            card.classList.add('flipped');
            card.textContent = gameGrid[index];
            selectedCards.push({card, index, value: gameGrid[index]});
            moves++;
            document.getElementById('moves').textContent = moves;
            
            if (selectedCards.length === 2) {
                setTimeout(checkMatch, 800);
            }
        }
        
        function checkMatch() {
            const [first, second] = selectedCards;
            const isMatch = first.value === second.value;
            
            if (isMatch) {
                first.card.classList.add('matched');
                second.card.classList.add('matched');
                score += 10;
                matchedPairs++;
            } else {
                first.card.classList.remove('flipped');
                second.card.classList.remove('flipped');
                first.card.textContent = '?';
                second.card.textContent = '?';
            }
            
            document.getElementById('score').textContent = score;
            document.getElementById('matches').textContent = matchedPairs + '/8';
            selectedCards = [];
            
            if (matchedPairs === 8) {
                endGame();
            }
        }
        
        function resetGame() {
            selectedCards = [];
            matchedPairs = 0;
            moves = 0;
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = '0/8';
            initializeGame();
        }
        
        function endGame() {
            localStorage.setItem('gameScore', score);
            localStorage.setItem('gameCompleted', 'true');
            localStorage.setItem('completedGameName', 'Story Creator 3D');
            localStorage.setItem('completedGameId', 'c2e10');
            
            document.getElementById('finalScore').textContent = score + ' Points!';
            document.getElementById('gameOverModal').classList.add('show');
            
            setTimeout(() => {
                window.location.href = '/subjects.html';
            }, 3000);
        }
        
        function goHome() {
            window.location.href = '/subjects.html';
        }
        
        initializeGame();
    </script>
</body>
</html>
