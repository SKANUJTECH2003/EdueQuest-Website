<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Game - EduQuest</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="gameframework.js"></script>
  
  <style>
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 15px;
        justify-content: center;
        margin: 2rem auto;
        max-width: 500px;
    }

    .card {
        width: 100px;
        height: 100px;
        perspective: 1000px;
        cursor: pointer;
    }

    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s;
        transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
        transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 10px;
        backface-visibility: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5rem;
        font-weight: bold;
    }

    .card-front {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: 2px solid #667eea;
    }

    .card-back {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        transform: rotateY(180deg);
        color: white;
    }

    .card:hover:not(.flipped) .card-front {
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .game-stats {
        display: flex;
        justify-content: space-around;
        gap: 2rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
    }

    .button-group {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
        flex-wrap: wrap;
    }

    @media (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
            max-width: 280px;
        }

        .card {
            width: 80px;
            height: 80px;
        }

        .card-front, .card-back {
            font-size: 2rem;
        }
    }
  </style>
</head>
<body>
  <div class="game-header">
    <div>
      <h1>🧠 Memory Flip</h1>
      <p style="color: #666; margin-top: 0.5rem;">Match all pairs to win!</p>
    </div>
    <div class="game-header-right">
      <div class="game-stat">
        <span class="game-stat-label">Score</span>
        <span class="game-stat-value" id="scoreDisplay">0</span>
      </div>
      <div class="game-stat timer">
        <i class="fas fa-clock"></i>
        <span id="timerDisplay">60</span>s
      </div>
    </div>
  </div>

  <div class="game-container">
    <div class="game-stats">
      <div>
        <span style="color: #666; font-weight: 600;">Matches: </span>
        <span id="matchCount" style="font-weight: 700; color: #1a73e8; font-size: 1.25rem;">0/6</span>
      </div>
      <div>
        <span style="color: #666; font-weight: 600;">Attempts: </span>
        <span id="attempts" style="font-weight: 700; color: #fbbc04; font-size: 1.25rem;">0</span>
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="button-group">
      <button class="btn btn-secondary" id="restartBtn">
        <i class="fas fa-sync-alt"></i> Restart
      </button>
      <button class="btn btn-danger" id="quitBtn">
        <i class="fas fa-times"></i> Quit Game
      </button>
    </div>
  </div>
  
  <script>
    // Initialize game
    const gameManager = new GameManager('Memory Flip', 'games');
    if (!gameManager.init()) {
        window.location.href = '/login.html';
    }

    const emojis = ['🍎', '🍌', '🍇', '🍓', '🍍', '🥝'];
    let gameGrid = [...emojis, ...emojis];
    let flippedCards = [];
    let matchedCount = 0;
    let attempts = 0;
    let timer = 60;
    let timerInterval;

    const grid = document.getElementById("grid");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const restartBtn = document.getElementById("restartBtn");
    const quitBtn = document.getElementById("quitBtn");
    const timerDisplay = document.getElementById("timerDisplay");
    const matchCountDisplay = document.getElementById("matchCount");
    const attemptsDisplay = document.getElementById("attempts");

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function createCard(emoji) {
      const card = document.createElement("div");
      card.classList.add("card");
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">❓</div>
          <div class="card-back">${emoji}</div>
        </div>
      `;
      card.dataset.emoji = emoji;
      card.addEventListener("click", handleCardClick);
      return card;
    }

    function handleCardClick(e) {
      const card = e.currentTarget;
      if (card.classList.contains("flipped") || flippedCards.length === 2) return;

      card.classList.add("flipped");
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        const [first, second] = flippedCards;
        attempts++;
        attemptsDisplay.textContent = attempts;

        if (first.dataset.emoji === second.dataset.emoji) {
          matchedCount++;
          gameManager.addPoints(10);
          scoreDisplay.textContent = gameManager.score;
          matchCountDisplay.textContent = `${matchedCount}/${emojis.length}`;
          flippedCards = [];
          
          if (matchedCount === emojis.length) {
            clearInterval(timerInterval);
            setTimeout(async () => {
              // Add bonus for remaining time
              const timeBonus = Math.max(0, timer * 2);
              gameManager.addPoints(timeBonus);
              
              // Update on server
              await gameManager.updateScoreOnServer();
              
              gameManager.showCompletionPopup();
            }, 300);
          }
        } else {
          setTimeout(() => {
            first.classList.remove("flipped");
            second.classList.remove("flipped");
            flippedCards = [];
          }, 1000);
        }
      }
    }

    function updateTimer() {
        timer--;
        timerDisplay.textContent = timer;
        
        const timerElement = document.querySelector('.timer');
        if (timer <= 10) {
            timerElement.classList.add('low');
        } else {
            timerElement.classList.remove('low');
        }

        if (timer <= 0) {
            clearInterval(timerInterval);
            alert("⏰ Time's up! Your score will be saved.");
            gameManager.updateScoreOnServer();
            setTimeout(() => window.location.href = '/subjects.html', 1000);
        }
    }

    function setupGame() {
      clearInterval(timerInterval);
      grid.innerHTML = '';
      matchedCount = 0;
      attempts = 0;
      flippedCards = [];
      timer = 60;
      gameManager.score = 0;
      gameManager.startTime = Date.now();
      
      scoreDisplay.textContent = gameManager.score;
      timerDisplay.textContent = timer;
      matchCountDisplay.textContent = `0/${emojis.length}`;
      attemptsDisplay.textContent = attempts;

      const shuffled = shuffle(gameGrid);
      shuffled.forEach(emoji => {
        grid.appendChild(createCard(emoji));
      });

      timerInterval = setInterval(updateTimer, 1000);
    }

    restartBtn.addEventListener("click", setupGame);
    quitBtn.addEventListener("click", () => {
        clearInterval(timerInterval);
        if (confirm('Are you sure you want to quit? Your progress will be saved.')) {
            gameManager.updateScoreOnServer();
            setTimeout(() => window.location.href = '/subjects.html', 500);
        }
    });
